name: ft_intra
description: "42 Intranet mobile app — multi-language dashboard, push notifications, campus tracking"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  retrofit: 4.4.1

  # Auth
  flutter_appauth: ^7.0.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Local DB
  drift: 2.22.1
  drift_flutter: 0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # Crypto
  crypto: ^3.0.6

  # HTML parsing
  html: ^0.15.5

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # WebView & URL
  webview_flutter: ^4.10.0
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.1

  # Location-based check-in (geofencing)
  native_geofence: ^1.0.0
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  timeago: ^3.7.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  retrofit_generator: 9.1.5
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
